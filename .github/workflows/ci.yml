name: CI

on:
  push:
    branches: [main, refactor-clean]
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app scripts tests
        working-directory: tfg-arquitectura/backend

  forecasting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pytest numpy scipy
      - run: ruff check shared tfg-forecasting/tests
      - run: pytest tfg-forecasting/tests/test_metrics.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tfg-arquitectura/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tfg-arquitectura/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
